baseURL: "https://wzysd.github.io/"
title: "wzy的博客"
locale: "zh"
defaultContentLanguage: "zh"
hasCJKLanguage: true
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

paginate: 10

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "wzy的博客"
  description: "记录数学、量化、AI、Agent、机器学习、深度学习与大模型的学习笔记"
  keywords: [量化, 人工智能, 机器学习, 深度学习, 大模型, Agent]
  author: "wzy"
  defaultTheme: auto
  disableThemeToggle: false
  math: true

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"

  label:
    text: ""
    icon: /images/logo.png
    iconHeight: 35

  homeInfoParams:
    Title: "wzy的博客"
    Content: "记录数学 · 量化 · AI · Agent · ML · DL · LLM 的学习之旅"

  socialIcons:
    - name: github
      url: "https://github.com/wzysd"

  analytics:
    google:
      SiteVerificationTag: ""
    fathom: null
    plausible: null
    goatcounter: null

  googleAnalytics: G-03QP72WMM2

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/wzysd/wzysd.github.io/tree/main/content"
    Text: "建议修改"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10

menu:
  main:
    - identifier: home
      name: 主页
      url: /
      weight: 1
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
      params:
        type: search
    - identifier: about
      name: 关于
      url: /about/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: "github"
